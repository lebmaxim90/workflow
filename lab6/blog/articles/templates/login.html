<!DOCTYPE html>
<html>
    <head>
        <title>Login</title>
        {% load static %}
        <link rel="stylesheet" href="{% static 'css/article.css' %}">
    </head>
    <body>
        <div class="header">
            <img src="{% static 'img/django-logo-positive.png' %}" />
            <div class="header-links">
                <a href="{% url 'register' %}" class="header-link">Register</a>
            </div>
        </div>
        <div class="content">
            <h1>Login</h1>
            <form method="POST" class="login-form">
                {% csrf_token %}
                
                <div class="form-group">
                    <label for="username">Username:</label>
                    <input type="text" name="username" id="username" 
                           placeholder="Enter username" value="{{ username }}">
                    {% if errors.username %}
                        <div class="field-error">{{ errors.username }}</div>
                    {% endif %}
                </div>
                
                <div class="form-group">
                    <label for="password">Password:</label>
                    <input type="password" name="password" id="password" 
                           placeholder="Enter password">
                    {% if errors.password %}
                        <div class="field-error">{{ errors.password }}</div>
                    {% endif %}
                </div>
                
                {% if errors.invalid %}
                    <div class="error">{{ errors.invalid }}</div>
                {% endif %}
                
                <div class="form-group">
                    <input type="submit" value="Login">
                </div>
            </form>
            
            <p class="back-link">Don't have an account? <a href="{% url 'register' %}">Register here</a></p>
            <p class="back-link"><a href="{% url 'archive' %}">Back to archive</a></p>
        </div>
    </body>
</html>
