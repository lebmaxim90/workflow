<!DOCTYPE html>
<html>
    <head>
        <title>Django Public Blog - create article</title>
        {% load static %}
        <link rel="stylesheet" href="{% static 'css/article.css' %}">
    </head>
    <body>
        <div class="header">
            <img src="{% static 'img/django-logo-positive.png' %}" />
        </div>
        <div class="content">
            <h1>Create new article</h1>
            <form method="POST">
                {% csrf_token %}
                <div class="form-group">
                    <label for="title">Title:</label>
                    <input type="text" name="title" id="title" placeholder="Enter article title" value="{{ form.title }}">
                </div>
                <div class="form-group">
                    <label for="text">Text:</label>
                    <textarea name="text" id="text" placeholder="Enter article text">{{ form.text }}</textarea>
                </div>
                <div class="form-group">
                    <input type="submit" value="Save">
                </div>
            </form>
            {% if form.errors %}
                <div class="error">{{ form.errors }}</div>
            {% endif %}
            <p><a href="{% url 'archive' %}">Back to archive</a></p>
        </div>
    </body>
</html>
