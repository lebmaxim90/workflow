<!DOCTYPE html>
<html>
    <head>
        <title>Создание новой статьи</title>
        {% load static %}
        <link rel="stylesheet" href="{% static 'css/article.css' %}">
    </head>
    <body class="archive">
        <div class="header">
            <img class="logo" src="{% static 'img/django-logo-positive.png' %}" alt="Логотип"/>
            <div class="header-text-area">
                <p class="service-title">Коллективный блог</p>
                <div class="auth-links">
                    {% if user.is_authenticated %}
                        <span class="username">{{ user.username }}</span>
                        <a href="{% url 'create_post' %}" class="register-link">Новая статья</a>
                    {% else %}
                        <a href="{% url 'register' %}" class="register-link">Регистрация</a>
                        <a href="{% url 'login' %}" class="register-link">Вход</a>
                    {% endif %}
                </div>
            </div>
        </div>
        
        <div class="content">
            <h1>Создать новую статью</h1>
            
            <form method="POST">
                {% csrf_token %}
                <div class="form-group">
                    <label for="title">Заголовок:</label>
                    <input type="text" name="title" id="title" placeholder="Введите заголовок статьи" value="{{ form.title }}">
                </div>
                <div class="form-group">
                    <label for="text">Текст:</label>
                    <textarea name="text" id="text" placeholder="Введите текст статьи">{{ form.text }}</textarea>
                </div>
                <div class="form-group">
                    <input type="submit" value="Сохранить">
                </div>
            </form>
            
            {% if form.errors %}
                <div class="error">{{ form.errors }}</div>
            {% endif %}
            
            <p class="back-link"><a href="{% url 'archive' %}">Вернуться к архиву</a></p>
        </div>
        
        <script src="{% static 'js/jquery-4.0.0.min.js' %}"></script>
    </body>
</html>
